id: sdd
title: Software Design Document
summary: >-
  Describes how a system will be built: the technical design, its structure, the alternatives weighed,
  and the cross-cutting concerns, so the design can be reviewed before the code exists. Describes an
  implementation, as distinct from an RFC (which proposes a decision) and an ADR (which records one).
doc_type: sdd
phase: develop
family: decision-docs
sizes_available: [lean, full]
default_size: lean
sizing_guidance: "Use lean, the Google-style five-section mini design doc, for most changes worth a design doc at all; use full when the design is hard to reverse, crosses teams, or has real non-functional targets, which adds the structural, runtime, interface, and deployment views plus quality attributes and risks."
methodology: generic
